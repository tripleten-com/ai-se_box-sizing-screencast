<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Sizing</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="row">
      <div class="ruler"></div>
      <div>
        <p class="label">content-box (default)</p>
        <div class="box box-a">I am 200px wide</div>
      </div>
      <div>
        <p class="label">border-box</p>
        <div class="box box-b">I am 200px wide</div>
      </div>
    </div>
  </body>
</html>
